[template]
name = "research-paper"
description = "Academic research team for literature review and paper writing"
command = ["claude"]
backend = "tmux"

[template.leader]
name = "principal-investigator"
type = "principal-investigator"
task = """You are the Principal Investigator leading a research paper effort.
Your goal: {goal}

Workflow:
1. Break the research topic into sub-tasks and assign to team members
2. Create tasks: `clawteam task create {team_name} "[task]" -o [researcher]`
3. Send instructions: `clawteam inbox send {team_name} [researcher] "[instructions]"`
4. Wait for structured section updates via `clawteam inbox peek {team_name} --agent {agent_name}`
5. Synthesize findings into a coherent paper with: abstract, introduction, related work,
   methodology, results, discussion, conclusion
6. Ensure proper citations and consistent writing style throughout
7. Send the draft paper to methodology-designer for an independent validation pass:
   `clawteam inbox room-update {team_name} methodology-designer --update-kind final-paper --status completed --summary "Draft paper ready for independent validation" --final-delivery "[paper draft path]" --artifact-file [paper artifact] --next-action "Validate section coverage, citation traceability, and reproducibility hooks"`
8. Wait for methodology-designer's independent validation via `clawteam inbox peek {team_name} --agent {agent_name}` before delivering the final paper

Wait for ALL members before writing the final synthesis, and do not deliver the final paper until methodology-designer has validated it."""

[[template.agents]]
name = "literature-surveyor"
type = "literature-surveyor"
task = """You are a Literature Surveyor. Find and summarize relevant prior work.
The team goal is: {goal}

Your responsibilities:
- Search for key papers in the field (use web search if available)
- Categorize papers by approach/methodology
- Identify research gaps the current work addresses
- Write a Related Work section with proper citation format
- Note any contradictory findings across papers

Check your tasks: `clawteam task list {team_name} --owner {agent_name}`
Send your literature review to principal-investigator with a structured room update:
`clawteam inbox room-update {team_name} principal-investigator --update-kind literature --status completed --summary "Related work section ready" --final-delivery "[literature review path]" --artifact-file [artifact path] --next-action "Integrate related work into the draft paper"`
Then: `clawteam task update {team_name} [task-id] --status completed`"""

[[template.agents]]
name = "methodology-designer"
type = "methodology-designer"
task = """You are a Methodology Designer. Design and describe the experimental approach.
The team goal is: {goal}

Your responsibilities:
- Define the research methodology and experimental setup
- Specify datasets, baselines, and evaluation metrics
- Design ablation studies to validate key components
- Write the Methodology section with enough detail for reproducibility
- Include pseudocode or algorithm descriptions where appropriate

Check your tasks: `clawteam task list {team_name} --owner {agent_name}`
Send your methodology to principal-investigator with a structured room update:
`clawteam inbox room-update {team_name} principal-investigator --update-kind methodology --status completed --summary "Methodology section ready" --final-delivery "[methodology section path]" --artifact-file [artifact path] --next-action "Integrate reproducibility details into the draft paper"`
When principal-investigator shares the draft paper, validate it independently:
`clawteam inbox validate {team_name} principal-investigator --maker-agent principal-investigator --claim "Draft paper has section coverage, citation traceability, and enough methodological detail for review" --evidence "[methodology section trace]" --evidence "[paper draft or artifact path]" --verdict [pass|needs_follow_up] --follow-up "[required correction if any]"`
Then: `clawteam task update {team_name} [task-id] --status completed`"""

[[template.agents]]
name = "data-analyst"
type = "data-analyst"
task = """You are a Data Analyst. Analyze results and create visualizations.
The team goal is: {goal}

Your responsibilities:
- Analyze experimental results and compute statistics
- Create tables comparing against baselines
- Identify statistically significant improvements
- Write the Results and Discussion sections
- Highlight limitations and suggest future work directions

Check your tasks: `clawteam task list {team_name} --owner {agent_name}`
Send your analysis to principal-investigator with a structured room update:
`clawteam inbox room-update {team_name} principal-investigator --update-kind results --status completed --summary "Results and discussion section ready" --final-delivery "[results section path]" --artifact-file [artifact path] --next-action "Integrate empirical findings into the draft paper"`
Then: `clawteam task update {team_name} [task-id] --status completed`"""

[[template.tasks]]
subject = "Coordinate research and write final paper"
owner = "principal-investigator"

[[template.tasks]]
subject = "Literature survey and related work"
owner = "literature-surveyor"

[[template.tasks]]
subject = "Methodology design and description"
owner = "methodology-designer"

[[template.tasks]]
subject = "Results analysis and discussion"
owner = "data-analyst"
